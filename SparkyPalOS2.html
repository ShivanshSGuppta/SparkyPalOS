<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkyPalOS</title>
    <link rel="icon" type="image/svg+xml" href="/assets/sparkypal-logo.svg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .canvas-container {
            cursor: crosshair;
            touch-action: none;
        }

        /* Fixes UI Drag Lag by stopping iframes from stealing the mouse focus during window movement */
        body.dragging-window iframe {
            pointer-events: none !important;
        }

        .sp-window {
            touch-action: none;
        }

        .sp-window-body {
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .desktop-icon {
            width: 96px;
            touch-action: none;
        }

        .desktop-icon-tile {
            width: 64px;
            height: 64px;
        }

        .desktop-icon-label {
            font-size: 12px;
            line-height: 1.1;
        }

        @media (max-width: 1024px) {
            .sp-window {
                max-width: calc(100vw - 12px) !important;
                max-height: calc(100vh - 86px) !important;
            }

            .sp-window-body {
                padding: 12px !important;
            }

            .desktop-icon {
                width: 74px;
            }

            .desktop-icon-tile {
                width: 52px;
                height: 52px;
            }

            .desktop-icon-label {
                font-size: 10px;
            }
        }

        @media (max-width: 768px) {
            .desktop-icon {
                width: 66px;
            }

            .desktop-icon-tile {
                width: 46px;
                height: 46px;
            }

            .desktop-icon-label {
                font-size: 9px;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Minimalist Brutalist Icon Set
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2.5, color = "currentColor" }) => {
            const paths = {

                type: <><polyline points="4 7 4 4 20 4 20 7" /><line x1="9" y1="20" x2="15" y2="20" /><line x1="12" y1="4" x2="12" y2="20" /></>,
                eraser: <path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20V20Z" />,

                gamepad: <><rect x="3" y="9" width="18" height="9" rx="3" ry="3" /><line x1="8" y1="13.5" x2="12" y2="13.5" /><line x1="10" y1="11.5" x2="10" y2="15.5" /><circle cx="16" cy="12.5" r="1" /><circle cx="18" cy="14.5" r="1" /></>,

        function App() {
            const [time, setTime] = useState(new Date());
            const [menuOpen, setMenuOpen] = useState(false);
            const [isDark, setIsDark] = useState(false);
            const [username, setUsername] = useState('USER');
            const [showNamePopup, setShowNamePopup] = useState(false);
            const [bootLoading, setBootLoading] = useState(true);
            const [bootProgress, setBootProgress] = useState(0);

            const [fileSystem, setFileSystem] = useState({
                'Documents': {
                    'welcome.txt': 'Welcome to SparkyPalOS!\nEnjoy the brutalist environment.'
                },
                'Downloads': {},
                'Pictures': {},
                'Projects': {},
                'Secrets': {}
            });

            // Window Management State
            const [windows, setWindows] = useState({
                dev: { isOpen: false, isFocused: false, isMinimized: false },
                aiKernel: { isOpen: false, isFocused: false, isMinimized: false },
                music: { isOpen: false, isFocused: false, isMinimized: false },
                dvd: { isOpen: false, isFocused: false, isMinimized: false },
                gita: { isOpen: false, isFocused: false, isMinimized: false },
                animeBook: { isOpen: false, isFocused: false, isMinimized: false },
                animeReader: { isOpen: false, isFocused: false, isMinimized: false },
                mahabharat: { isOpen: false, isFocused: false, isMinimized: false },
                ramayan: { isOpen: false, isFocused: false, isMinimized: false },
                system: { isOpen: false, isFocused: false, isMinimized: false },
                console: { isOpen: false, isFocused: false, isMinimized: false },
                settings: { isOpen: false, isFocused: false, isMinimized: false },
                notepad: { isOpen: false, isFocused: false, isMinimized: false },
                weather: { isOpen: false, isFocused: false, isMinimized: false },
                camera: { isOpen: false, isFocused: false, isMinimized: false },
                browser: { isOpen: false, isFocused: false, isMinimized: false },
                calendar: { isOpen: false, isFocused: false, isMinimized: false },
                suredbits: { isOpen: false, isFocused: false, isMinimized: false },
                arxiv: { isOpen: false, isFocused: false, isMinimized: false },
                liveMap: { isOpen: false, isFocused: false, isMinimized: false },
                calculator: { isOpen: false, isFocused: false, isMinimized: false },
                mathSolver: { isOpen: false, isFocused: false, isMinimized: false },
                compiler: { isOpen: false, isFocused: false, isMinimized: false },
                liveNews: { isOpen: false, isFocused: false, isMinimized: false },
                liveNewsReader: { isOpen: false, isFocused: false, isMinimized: false },
                arxivReader: { isOpen: false, isFocused: false, isMinimized: false },
                liveStocks: { isOpen: false, isFocused: false, isMinimized: false },
                virtualPC: { isOpen: false, isFocused: false, isMinimized: false },
                viewer: { isOpen: false, isFocused: false, isMinimized: false, file: null, content: null }
            });
            const [animeReaderState, setAnimeReaderState] = useState({
                loading: false,
                error: '',
                item: null,
                pages: [],
                page: 0
            });
            const [newsReaderState, setNewsReaderState] = useState({ loading: false, error: '', item: null, pages: [], page: 0 });
            const [arxivReaderState, setArxivReaderState] = useState({ loading: false, error: '', item: null, pages: [], page: 0 });
            const [wallpaperTheme, setWallpaperTheme] = useState('spiderman');
            const [viewport, setViewport] = useState({
                width: typeof window !== 'undefined' ? window.innerWidth : 1440,
                height: typeof window !== 'undefined' ? window.innerHeight : 900
            });

            // Update clock
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Boot loader then login modal
            useEffect(() => {
                setBootLoading(true);
                setBootProgress(0);
                const progressTimer = setInterval(() => {
                    setBootProgress((prev) => Math.min(100, prev + 10));
                }, 250);
                const completeTimer = setTimeout(() => {
                    setBootLoading(false);
                    setShowNamePopup(true);
                }, 2500);
                return () => {
                    clearInterval(progressTimer);
                    clearTimeout(completeTimer);
                };
            }, []);

            useEffect(() => {
                const onResize = () => setViewport({ width: window.innerWidth, height: window.innerHeight });
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            const toggleWindow = (id) => {
                setWindows(prev => ({
                    ...prev,
                    [id]: { ...prev[id], isOpen: !prev[id].isOpen, isFocused: !prev[id].isOpen, isMinimized: false }
                }));
                setMenuOpen(false);
            };

            const focusWindow = (id) => {
                setWindows(prev => {
                    const next = { ...prev };
                    Object.keys(next).forEach(k => next[k].isFocused = false);
                    next[id] = { ...next[id], isFocused: true, isMinimized: false, isOpen: true };
                    return next;
                });
            };

            const minimizeWindow = (id) => {
                setWindows(prev => ({ ...prev, [id]: { ...prev[id], isMinimized: true, isFocused: false } }));
            };

            const handleTaskbarClick = (id) => {
                setWindows(prev => {
                    const next = { ...prev };
                    const win = next[id];
                    if (!win.isOpen) {
                        Object.keys(next).forEach(k => next[k].isFocused = false);
                        next[id] = { ...win, isOpen: true, isMinimized: false, isFocused: true };
                    } else if (win.isMinimized) {
                        Object.keys(next).forEach(k => next[k].isFocused = false);
                        next[id] = { ...win, isMinimized: false, isFocused: true };
                    } else if (win.isFocused) {
                        next[id] = { ...win, isMinimized: true, isFocused: false };
                    } else {
                        Object.keys(next).forEach(k => next[k].isFocused = false);
                        next[id] = { ...win, isFocused: true };
                    }
                    return next;
                });
                setMenuOpen(false);
            };

            const openFile = (fileName, content) => {
                setWindows(prev => {
                    const next = { ...prev };
                    Object.keys(next).forEach(k => next[k].isFocused = false);
                    next.viewer = { isOpen: true, isFocused: true, isMinimized: false, file: fileName, content: content };
                    return next;
                });
            };

            const openAnimeReader = async (item) => {
                if (!item) return;
                setAnimeReaderState({ loading: true, error: '', item, pages: [], page: 0 });
                focusWindow('animeReader');
                try {
                    const params = new URLSearchParams({
                        id: item.id || '',
                        title: item.title || '',
                        textUrl: item?.content?.textUrl || ''
                    });
                    const res = await fetch(`/api/anime/read?${params.toString()}`);
                    if (!res.ok) throw new Error('Reader content unavailable');
                    const data = await res.json();
                    const result = data?.result || {};
                    const pages = Array.isArray(result?.content?.pages) ? result.content.pages : [];
                    setAnimeReaderState({
                        loading: false,
                        error: '',
                        item: { ...item, ...result, title: result?.title || item.title },
                        pages,
                        page: 0
                    });
                } catch (err) {
                    setAnimeReaderState((prev) => ({ ...prev, loading: false, error: err.message || 'Reader load failed' }));
                }
            };

            const openNewsReader = async (item) => {
                if (!item) return;
                setNewsReaderState({ loading: true, error: '', item, pages: [], page: 0 });
                focusWindow('liveNewsReader');
                try {
                    const params = new URLSearchParams({
                        id: item.id || '',
                        title: item.title || '',
                        url: item.url || '',
                        description: item.description || ''
                    });
                    const res = await fetch(`/api/news/read?${params.toString()}`);
                    if (!res.ok) throw new Error('News reader unavailable');
                    const data = await res.json();
                    const result = data?.result || {};
                    const pages = Array.isArray(result?.content?.pages) ? result.content.pages : [];
                    setNewsReaderState({ loading: false, error: '', item: { ...item, ...result }, pages, page: 0 });
                } catch (err) {
                    setNewsReaderState((prev) => ({ ...prev, loading: false, error: err.message || 'News reader failed' }));
                }
            };

            const openArxivReader = async (item) => {
                if (!item) return;
                setArxivReaderState({ loading: true, error: '', item, pages: [], page: 0 });
                focusWindow('arxivReader');
                try {
                    const params = new URLSearchParams({
                        id: item.id || '',
                        title: item.title || '',
                        url: item.url || '',
                        description: item.description || ''
                    });
                    const res = await fetch(`/api/research/arxiv/read?${params.toString()}`);
                    if (!res.ok) throw new Error('Research reader unavailable');
                    const data = await res.json();
                    const result = data?.result || {};
                    const pages = Array.isArray(result?.content?.pages) ? result.content.pages : [];
                    setArxivReaderState({ loading: false, error: '', item: { ...item, ...result }, pages, page: 0 });
                } catch (err) {
                    setArxivReaderState((prev) => ({ ...prev, loading: false, error: err.message || 'Research reader failed' }));
                }
            };

            const theme = {
                bg: isDark ? 'bg-[#111]' : 'bg-[#f4f0e6]',
                text: isDark ? 'text-white' : 'text-black',
                border: isDark ? 'border-white' : 'border-black',
                windowBg: isDark ? 'bg-[#000]' : 'bg-white',
                shadow: isDark ? 'shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]' : 'shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]',
                shadowHover: isDark ? 'hover:shadow-[2px_2px_0px_0px_rgba(255,255,255,1)]' : 'hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]',
                shadowLarge: isDark ? 'shadow-[8px_8px_0px_0px_rgba(255,255,255,1)]' : 'shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]',
                gridColor: isDark ? '#333' : '#000'
            };

            const wallpaperPresets = {
                spiderman: {
                    name: 'Spiderman',
                    style: {
                        image: 'url("/assets/wallpapers/spiderman.png")',
                        title: 'SPIDERMAN MODE'
                    }
                },
                naruto: {
                    name: 'Naruto',
                    style: {
                        image: 'url("/assets/wallpapers/naruto.png")',
                        title: 'NARUTO MODE'
                    }
                }
            };

            const iconGridPos = (index) => {
                const cols = 5;
                const col = index % cols;
                const row = Math.floor(index / cols);
                const compact = viewport.width <= 1024;

                const offsetY = compact ? 8 : 40;
                return { x: offsetX + (col * cellW), y: offsetY + (row * cellH) };

        // --- SUBCOMPONENTS ---

        function Window({ id, title, headerColor, icon, isOpen, isMinimized, isFocused, onFocus, onClose, onMinimize, children, initPos, theme, width = "w-[450px]" }) {
            const [pos, setPos] = useState(initPos);
            const [isMaximized, setIsMaximized] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [viewport, setViewport] = useState({
                width: typeof window !== 'undefined' ? window.innerWidth : 1440,
                height: typeof window !== 'undefined' ? window.innerHeight : 900
            });
            const dragRef = useRef(null);
            const winRef = useRef(null);

            const startDrag = (clientX, clientY) => {
                if (isMaximized) return;
                onFocus();
                dragRef.current = { startX: clientX, startY: clientY, initX: pos.x, initY: pos.y, moved: false };
                setIsDragging(true);
                document.body.style.userSelect = 'none';
                document.body.classList.add('dragging-window');
            };

            const handlePointerDown = (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                e.preventDefault();
                startDrag(e.clientX, e.clientY);
            };

            useEffect(() => {
                const onResize = () => setViewport({ width: window.innerWidth, height: window.innerHeight });
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (!isDragging || isMaximized || !dragRef.current) return;
                    if (e.pointerType === 'touch') e.preventDefault();

                    const newX = dragRef.current.initX + (e.clientX - dragRef.current.startX);
                    const newY = dragRef.current.initY + (e.clientY - dragRef.current.startY);

                    if (winRef.current && !isMaximized) {
                        winRef.current.style.left = `${newX}px`;
                        winRef.current.style.top = `${newY}px`;
                    }

                    dragRef.current.lastX = newX;
                    dragRef.current.lastY = newY;
                    dragRef.current.moved = true;
                };

                const handlePointerUp = () => {
                    if (isDragging) {
                        setIsDragging(false);
                        document.body.style.userSelect = '';
                        document.body.classList.remove('dragging-window');
                        if (dragRef.current && dragRef.current.lastX !== undefined && !isMaximized) {
                            const winW = winRef.current?.offsetWidth || 360;
                            const winH = winRef.current?.offsetHeight || 260;
                            const clampedX = Math.min(Math.max(0, dragRef.current.lastX), Math.max(0, viewport.width - winW - 2));
                            const clampedY = Math.min(Math.max(0, dragRef.current.lastY), Math.max(0, viewport.height - winH - 78));
                            setPos({ x: clampedX, y: clampedY });
                        }
                        dragRef.current = null;
                    }
                };

                if (isDragging) {
                    document.addEventListener('pointermove', handlePointerMove, { passive: false });
                    document.addEventListener('pointerup', handlePointerUp);
                    document.addEventListener('pointercancel', handlePointerUp);
                }
                return () => {
                    document.removeEventListener('pointermove', handlePointerMove);
                    document.removeEventListener('pointerup', handlePointerUp);
                    document.removeEventListener('pointercancel', handlePointerUp);
                };
            }, [isDragging, isMaximized, viewport.width, viewport.height]);

            if (!isOpen) return null;
            const compact = viewport.width <= 1024;

            const winStyle = isMaximized
                ? { left: 0, top: 0, right: 0, bottom: 0, width: 'auto', height: 'auto' }
                : {
                    left: Math.min(Math.max(0, pos.x), viewport.width ? viewport.width - 50 : 1000),
                    top: Math.max(0, pos.y),
                    width: compact ? 'min(96vw, 760px)' : undefined,
                    minWidth: compact ? '280px' : undefined
                };

            return (
                <div ref={winRef} onMouseDown={onFocus} onPointerDown={onFocus}
                    className={`sp-window absolute flex flex-col ${isMaximized ? '' : width} ${isMinimized ? 'hidden' : 'flex'} ${theme.windowBg} border-4 ${theme.border} transition-shadow ${isFocused ? `z-50 ${isMaximized ? '' : theme.shadowLarge}` : `z-10 ${isMaximized ? '' : theme.shadow}`}`}
                    style={{ ...winStyle, maxWidth: compact ? 'calc(100vw - 10px)' : 'calc(100vw - 40px)', maxHeight: compact ? 'calc(100vh - 88px)' : 'calc(100vh - 120px)' }}>
                    <div
                        onPointerDown={handlePointerDown}
                        onDoubleClick={() => setIsMaximized(!isMaximized)}
                        className={`${headerColor} shrink-0 px-4 py-3 flex justify-between items-center border-b-4 ${theme.border} ${isMaximized ? '' : 'cursor-move'} select-none`}
                        style={{ touchAction: isMaximized ? 'auto' : 'none' }}
                    >
                        <div className="flex items-center gap-2 text-black overflow-hidden pr-4">
                            <Icon name={icon} size={16} strokeWidth={3} color="#000" className="shrink-0" />
                            <span className="font-black text-sm tracking-widest uppercase truncate">{title}</span>
                        </div>
                        <div className="flex gap-2 shrink-0">
                            <button onClick={(e) => { e.stopPropagation(); onMinimize(); }} className={`w-5 h-5 rounded-none bg-[#FFDE59] border-2 border-black hover:bg-white`}></button>
                            <button onClick={(e) => { e.stopPropagation(); setIsMaximized(!isMaximized); }} className={`w-5 h-5 rounded-none bg-[#00E5FF] border-2 border-black hover:bg-white`}></button>
                            <button onClick={(e) => { e.stopPropagation(); onClose(); }} className={`w-5 h-5 rounded-none bg-[#FF6B6B] border-2 border-black hover:bg-white flex items-center justify-center`}>
                                <span className="text-black text-xs font-black leading-none mb-[2px]">X</span>
                            </button>
                        </div>
                    </div>
                    <div className={`sp-window-body ${compact ? 'p-3' : 'p-6'} flex-1 overflow-auto bg-inherit`}>{children}</div>
                </div>
            );
        }

        // --- APP CONTENTS ---

        function BrowserContent({ theme }) {
            const [embedUrl, setEmbedUrl] = useState('https://archive.org');
            const [customUrl, setCustomUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const iframeRef = useRef(null);

            const curatedEmbeds = [
                { label: 'Internet Archive', url: 'https://archive.org' },
                { label: 'Piped Video', url: 'https://piped.video' },
                { label: 'YouTube Home (Embed)', url: 'https://www.youtube.com/embed?autoplay=0' },
                { label: 'Wikipedia', url: 'https://www.wikipedia.org' },
                { label: 'Open Library', url: 'https://openlibrary.org' }
            ];

            const toEmbedUrl = (value) => {
                const raw = value.trim();
                if (!raw) return '';
                const lower = raw.toLowerCase();
                if (lower.includes('youtube.com/watch?v=')) {
                    const id = raw.split('v=')[1]?.split('&')[0];
                    if (id) return `https://www.youtube.com/embed/${id}?autoplay=1`;
                }
                if (lower.includes('youtu.be/')) {
                    const id = raw.split('youtu.be/')[1]?.split('?')[0];
                    if (id) return `https://www.youtube.com/embed/${id}?autoplay=1`;
                }
                if (lower.includes('youtube.com/embed/')) return raw;
                if (/^[a-zA-Z0-9-]+\.[a-zA-Z0-9-.]+/.test(raw) && !raw.startsWith('http')) return `https://${raw}`;
                return raw;
            };

            const reloadEmbed = () => {
                if (iframeRef.current) {
                    const currentSrc = iframeRef.current.src;
                    iframeRef.current.src = 'about:blank';
                    setTimeout(() => {
                        iframeRef.current.src = currentSrc;
                        setLoading(true);
                    }, 50);
                }
            };

            const applyCustomEmbed = (e) => {
                e.preventDefault();
                const nextUrl = toEmbedUrl(customUrl);
                if (!nextUrl) return;
                setEmbedUrl(nextUrl);
                setLoading(true);
            };

            return (
                <div className="flex flex-col gap-0 h-full w-full">

                                {curatedEmbeds.map((item) => (
                                    <option key={item.url} value={item.url}>{item.label}</option>
                                ))}
                            </select>
                            <button onClick={reloadEmbed} className={`px-4 border-4 ${theme.border} bg-[#00E5FF] text-black font-black uppercase`}>
                                Reload
                            </button>
                            <a href={embedUrl} target="_blank" rel="noreferrer" className={`px-4 border-4 ${theme.border} bg-white text-black font-black uppercase flex items-center`}>
                                Open
                            </a>
                        </div>
                    </div>
                    <form onSubmit={applyCustomEmbed} className={`flex border-4 ${theme.border} border-t-0 p-2 gap-2 bg-white`}>
                        <input
                            type="text"
                            value={customUrl}
                            onChange={(e) => setCustomUrl(e.target.value)}
                            placeholder="Paste YouTube/watch or direct embed URL..."
                            className={`flex-1 border-4 ${theme.border} px-2 py-1 font-bold text-sm outline-none bg-white text-black`}
                        />
                        <button type="submit" className={`px-4 border-4 ${theme.border} bg-[#FFDE59] text-black font-black uppercase`}>
                            Load
                        </button>
                    </form>
                    <div className={`flex-1 relative border-4 ${theme.border} bg-white h-full min-h-[300px]`}>
                        {loading && <div className="absolute inset-0 flex items-center justify-center font-black bg-white/80 z-10 uppercase tracking-widest text-sm">Loading...</div>}
                        <iframe
                            ref={iframeRef}
                            src={embedUrl}
                            className="w-full h-full border-none absolute inset-0 bg-white"
                            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                            title="browser-embed"
                            onLoad={() => setLoading(false)}
                            onError={() => setLoading(false)}

            );
        }

        function WeatherContent({ theme }) {
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(false);

            const fetchWeather = async () => {
                setLoading(true);
                try {
                    // Try Primary Geolocation IP API
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();

                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ipData.latitude}&longitude=${ipData.longitude}&current_weather=true`);
                    const data = await res.json();
                    setWeather({ ...data.current_weather, city: ipData.city || 'LOCAL AREA' });
                } catch (e) {
                    try {
                        // Fallback Geolocation IP API if first is blocked
                        const ipRes2 = await fetch('https://get.geojs.io/v1/ip/geo.json');
                        const ipData2 = await ipRes2.json();

                        const res2 = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ipData2.latitude}&longitude=${ipData2.longitude}&current_weather=true`);
                        const data2 = await res2.json();
                        setWeather({ ...data2.current_weather, city: ipData2.city || 'LOCAL AREA' });
                    } catch (e2) {
                        // Absolute Safe Fallback to New York if network blocks IP mapping
                        const res3 = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.7128&longitude=-74.0060&current_weather=true');
                        const data3 = await res3.json();
                        setWeather({ ...data3.current_weather, city: 'NEW YORK (DEFAULT)' });
                    }
                }
                setLoading(false);
            };

            useEffect(() => { fetchWeather(); }, []);

            return (
                <div className="flex flex-col gap-4 h-full">
                    <div className={`p-6 border-4 ${theme.border} bg-[#00E5FF] text-black ${theme.shadow} flex flex-col items-center justify-center min-h-[200px] h-full`}>
                        {loading ? <p className="font-bold">LOCATING RADAR...</p> : weather ? (
                            <>
                                <h3 className="font-black uppercase text-xl tracking-widest mb-4 text-center">{weather.city}</h3>
                                <div className="text-7xl font-black mb-4">{Math.round(weather.temperature)}°</div>
                                <div className="uppercase font-bold tracking-widest bg-white border-2 border-black px-3 py-1 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                                    Wind: {weather.windspeed} km/h
                                </div>
                            </>
                        ) : <p className="font-bold text-red-600 bg-white px-2 py-1">ERROR FETCHING</p>}
                        <button onClick={fetchWeather} className={`mt-6 px-6 py-2 bg-[#FFDE59] border-4 border-black text-black font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all`}>
                            Refresh
                        </button>
                    </div>
                </div>
            );
        }

        function CameraContent({ theme, fs, setFs }) {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [streamActive, setStreamActive] = useState(false);
            const [msg, setMsg] = useState('');

            useEffect(() => {
                let activeStream = null;

                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(s => {
                        activeStream = s;
                        setStreamActive(true);
                        if (videoRef.current) videoRef.current.srcObject = s;
                    })
                    .catch(e => setMsg('Camera access denied'));

                // Kills active webcam hardware/light immediately upon component unmount
                return () => {
                    if (activeStream) {
                        activeStream.getTracks().forEach(track => track.stop());
                    }
                };
            }, []);

            const takePhoto = () => {
                if (!videoRef.current || !canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                canvasRef.current.width = videoRef.current.videoWidth;
                canvasRef.current.height = videoRef.current.videoHeight;
                ctx.drawImage(videoRef.current, 0, 0);
                const dataUrl = canvasRef.current.toDataURL('image/png');
                const fileName = `photo_${Date.now()}.png`;
                setFs(prev => ({ ...prev, 'Pictures': { ...prev['Pictures'], [fileName]: dataUrl } }));
                setMsg(`Saved to Pictures!`);
                setTimeout(() => setMsg(''), 3000);
            };

            return (
                <div className="flex flex-col gap-4 h-full">
                    <div className={`border-4 ${theme.border} bg-black relative w-full aspect-video flex items-center justify-center overflow-hidden shadow-inner`}>

        function NotepadContent({ theme, fs, setFs }) {
            const canvasRef = useRef(null);
            const [tool, setTool] = useState('text'); // pen, marker, pencil, eraser, text
            const [color, setColor] = useState('#000000');
            const [font, setFont] = useState('Arial');
            const [textContent, setTextContent] = useState('');
            const [isDrawing, setIsDrawing] = useState(false);
            const [msg, setMsg] = useState('');

            const colors = ['#000000', '#FF6B6B', '#00E5FF', '#FFDE59', '#FF90E8'];
            const fonts = ['Arial', 'Courier New', 'Times New Roman', 'Comic Sans MS', 'Impact'];
            const tools = [
                { id: 'pen', icon: 'pen', label: 'Pen' },
                { id: 'marker', icon: 'edit', label: 'Marker' },
                { id: 'pencil', icon: 'pencil', label: 'Pencil' },
                { id: 'eraser', icon: 'eraser', label: 'Eraser' },
                { id: 'text', icon: 'type', label: 'Text Editor' },
            ];

            const isTextMode = tool === 'text';

            useEffect(() => {
                if (canvasRef.current && !isTextMode) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                }
            }, [isTextMode]);

            const startDrawing = (e) => {
                if (isTextMode) return;
                const { offsetX, offsetY } = e.nativeEvent;
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(offsetX, offsetY);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing || isTextMode) return;
                const { offsetX, offsetY } = e.nativeEvent;
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(offsetX, offsetY);
                ctx.strokeStyle = color;

                if (tool === 'pen') {
                    ctx.lineWidth = 3;
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 1.0;
                } else if (tool === 'marker') {
                    ctx.lineWidth = 15;
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 0.3;
                } else if (tool === 'pencil') {
                    ctx.lineWidth = 1;
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 0.8;
                } else if (tool === 'eraser') {
                    ctx.lineWidth = 25;
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.globalAlpha = 1.0;
                }

                ctx.stroke();
            };

            const stopDrawing = () => setIsDrawing(false);

            const saveToVFS = () => {
                if (isTextMode) {

        function AIKernelContent({ theme, username }) {
            const [sessionId, setSessionId] = useState('');
            const [backendOk, setBackendOk] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'SPARKYPAL AI ONLINE. ENTER A PROMPT TO START.' }
            ]);
            const [input, setInput] = useState('');
            const [isStreaming, setIsStreaming] = useState(false);
            const [error, setError] = useState('');
            const endRef = useRef(null);

            const scrollToEnd = () => {
                setTimeout(() => endRef.current?.scrollIntoView({ behavior: 'smooth' }), 0);
            };

            const setLastAssistant = (content) => {
                setMessages(prev => {
                    if (prev.length === 0) return prev;
                    const next = [...prev];
                    const lastIdx = next.length - 1;
                    next[lastIdx] = { ...next[lastIdx], content, role: 'assistant' };
                    return next;
                });
            };

            const bootstrap = async () => {
                try {
                    const healthRes = await fetch('/api/health');
                    if (!healthRes.ok) throw new Error('health check failed');
                    setBackendOk(true);

                    const sessionRes = await fetch('/api/session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username })
                    });
                    if (!sessionRes.ok) throw new Error('session init failed');
                    const data = await sessionRes.json();
                    const sid = data.sessionId || '';
                    setSessionId(sid);
                    return sid;
                } catch (e) {
                    setBackendOk(false);
                    setError('Backend unavailable. Start server with: npm start');
                    return '';
                }
            };

            useEffect(() => { bootstrap(); }, [username]);
            useEffect(() => { scrollToEnd(); }, [messages]);

            const streamPrompt = (activeSessionId, prompt) => {
                return new Promise((resolve, reject) => {
                    let finalText = '';
                    const streamUrl = `/api/chat/stream?sessionId=${encodeURIComponent(activeSessionId)}&message=${encodeURIComponent(prompt)}`;
                    const eventSource = new EventSource(streamUrl);

                    eventSource.addEventListener('session', (ev) => {
                        try {
                            const data = JSON.parse(ev.data);
                            if (data.sessionId) setSessionId(data.sessionId);
                        } catch {
                            // Ignore malformed chunks.
                        }
                    });

                    eventSource.addEventListener('token', (ev) => {
                        try {
                            const data = JSON.parse(ev.data);
                            finalText += data.token || '';
                            setLastAssistant(finalText);
                        } catch {
                            // Ignore malformed chunks.
                        }
                    });

                    eventSource.addEventListener('done', (ev) => {
                        try {
                            const data = JSON.parse(ev.data);
                            finalText = data.message || finalText;
                            setLastAssistant(finalText);
                        } catch {
                            // Ignore malformed chunks.
                        }
                        eventSource.close();
                        resolve(finalText);
                    });

                    eventSource.addEventListener('error', () => {
                        eventSource.close();
                        reject(new Error('stream failed'));
                    });
                });
            };

            const fallbackPrompt = async (activeSessionId, prompt) => {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: activeSessionId, message: prompt })
                });
                if (!res.ok) {
                    throw new Error('fallback chat failed');
                }
                const data = await res.json();
                setSessionId(data.sessionId || activeSessionId);
                return data.message || '';
            };

            const sendPrompt = async () => {
                const prompt = input.trim();
                if (!prompt || isStreaming) return;

                if (!backendOk) {
                    setError('Backend not connected. Run npm start in this folder.');
                    return;
                }

                setInput('');
                setError('');
                setIsStreaming(true);
                let activeSessionId = sessionId;

                if (!activeSessionId) {
                    activeSessionId = await bootstrap();
                }

                setMessages(prev => [...prev, { role: 'user', content: prompt }, { role: 'assistant', content: '' }]);

                try {
                    await streamPrompt(activeSessionId, prompt);
                } catch {
                    try {
                        const fallbackText = await fallbackPrompt(activeSessionId, prompt);
                        setLastAssistant(fallbackText);
                    } catch (fallbackErr) {
                        setLastAssistant('Request failed. Verify backend/LLM configuration and retry.');
                        setError(fallbackErr.message);
                    }
                } finally {
                    setIsStreaming(false);
                }
            };

            return (
                <div className="flex flex-col gap-3 h-full min-h-[360px]">
                    <div className={`border-4 ${theme.border} p-3 ${backendOk ? 'bg-[#80FF72]' : 'bg-[#FFDE59]'} text-black ${theme.shadow} uppercase text-xs tracking-wider`}>
                        {backendOk ? `Backend online | Session ${sessionId || 'initializing'}` : 'Backend offline | Run npm start'}
                    </div>

                    <div className={`flex-1 border-4 ${theme.border} bg-black text-[#80FF72] p-3 font-mono text-sm overflow-y-auto`}>
                        {messages.map((msg, idx) => (
                            <div key={idx} className="mb-3 whitespace-pre-wrap">
                                <span className={`font-black ${msg.role === 'user' ? 'text-[#00E5FF]' : 'text-[#80FF72]'}`}>
                                    {msg.role === 'user' ? `${username}> ` : 'SPARKYPAL AI> '}
                                </span>
                                <span>{msg.content || (isStreaming && idx === messages.length - 1 ? '...' : '')}</span>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>

                    {error && (
                        <div className="border-4 border-black bg-[#FF6B6B] text-black p-2 text-xs font-black uppercase">
                            {error}
                        </div>
                    )}

                    <div className="flex gap-2">
                        <input
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && sendPrompt()}
                            className={`flex-1 border-4 ${theme.border} bg-white text-black px-3 py-2 font-bold outline-none`}
                            placeholder="Ask SparkyPal AI..."
                            spellCheck="false"
                        />
                        <button
                            onClick={sendPrompt}
                            disabled={isStreaming}
                            className={`px-4 py-2 border-4 border-black bg-[#80FF72] text-black font-black uppercase disabled:opacity-50 ${theme.shadow} hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all`}
                        >
                            {isStreaming ? 'Sending' : 'Send'}
                        </button>
                    </div>
                </div>
            );
        }

        function MusicContent({ theme }) {
            const [tracks, setTracks] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [shuffle, setShuffle] = useState(false);
            const [repeat, setRepeat] = useState(false);
            const [volume, setVolume] = useState(0.7);
            const [query, setQuery] = useState('');
            const audioRef = useRef(null);

            const loadTracks = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetch('/api/music/catalog?limit=100&langs=en,hi,pa&mode=hybrid');
                    if (!res.ok) throw new Error('Unable to load hybrid music catalog');
                    const data = await res.json();
                    const next = Array.isArray(data.results) ? data.results : [];
                    setTracks(next);
                    setCurrentIdx(0);
                    if (!next.length) {
                        setError('No playable tracks available right now. Retry in a moment.');
                    }
                } catch (err) {
                    setError(err.message || 'Failed to load tracks');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadTracks(); }, []);
            useEffect(() => {
                if (audioRef.current) audioRef.current.volume = volume;
            }, [volume]);

            const filteredTracks = tracks.filter((item) => {
                if (!query.trim()) return true;
                const q = query.toLowerCase();
                return (item.title || '').toLowerCase().includes(q)
                    || (item.description || '').toLowerCase().includes(q)
                    || (item.source || '').toLowerCase().includes(q)
                    || (item.language || '').toLowerCase().includes(q);
            });
            const currentTrack = filteredTracks[currentIdx] || filteredTracks[0];

            const goNext = () => {
                if (filteredTracks.length === 0) return;
                if (shuffle) {
                    setCurrentIdx(Math.floor(Math.random() * filteredTracks.length));
                    return;
                }
                setCurrentIdx((idx) => {
                    const next = idx + 1;
                    if (next >= filteredTracks.length) return repeat ? 0 : idx;
                    return next;
                });
            };

            const goPrev = () => {
                if (filteredTracks.length === 0) return;
                setCurrentIdx((idx) => Math.max(0, idx - 1));
            };

            useEffect(() => {
                setCurrentIdx(0);
            }, [query]);

            return (
                <div className="flex flex-col gap-3 h-full min-h-[360px]">
                    <div className={`border-4 ${theme.border} bg-[#8ED8FF] text-black p-3 font-black uppercase text-xs`}>

                    <div className="flex gap-2">

                        <button onClick={loadTracks} className={`px-3 py-1 border-4 ${theme.border} bg-[#FFDE59] text-black font-black uppercase`}>Reload</button>
                    </div>
                    {error && <div className="border-4 border-black bg-[#FF6B6B] p-2 text-xs font-black uppercase">{error}</div>}
                    <div className={`border-4 ${theme.border} bg-white p-3`}>
                        <div className="font-black uppercase text-sm">{currentTrack?.title || 'No track selected'}</div>
                        <div className="text-xs">{currentTrack?.description || 'No metadata available.'}</div>
                        {!!currentTrack && (
                            <div className="mt-2 flex flex-wrap gap-2 text-[10px] font-black uppercase">
                                <span className="px-2 py-1 border-2 border-black bg-[#FFDE59]">{currentTrack.playbackType === 'preview' ? 'Preview' : 'Full'}</span>
                                <span className="px-2 py-1 border-2 border-black bg-[#80FF72]">{(currentTrack.language || 'unknown').toUpperCase()}</span>
                                <span className="px-2 py-1 border-2 border-black bg-[#E5E7EB]">{currentTrack.source || 'unknown source'}</span>
                            </div>
                        )}
                        <audio
                            ref={audioRef}
                            key={currentTrack?.id || 'none'}
                            controls
                            autoPlay
                            onEnded={goNext}
                            src={currentTrack?.mediaUrl || ''}
                            className="w-full mt-2"
                        />
                        {!currentTrack?.mediaUrl && <div className="text-[10px] mt-1 font-black uppercase text-red-600">No playable stream found for this item.</div>}
                        <div className="mt-2 flex items-center gap-2">
                            <button onClick={goPrev} className={`px-2 py-1 border-2 ${theme.border} bg-white text-xs font-black uppercase`}>Prev</button>
                            <button onClick={goNext} className={`px-2 py-1 border-2 ${theme.border} bg-white text-xs font-black uppercase`}>Next</button>
                            <button onClick={() => setShuffle((v) => !v)} className={`px-2 py-1 border-2 ${theme.border} ${shuffle ? 'bg-[#00E5FF]' : 'bg-white'} text-xs font-black uppercase`}>Shuffle</button>
                            <button onClick={() => setRepeat((v) => !v)} className={`px-2 py-1 border-2 ${theme.border} ${repeat ? 'bg-[#00E5FF]' : 'bg-white'} text-xs font-black uppercase`}>Repeat</button>
                            <label className="text-xs font-black uppercase ml-auto">Vol</label>
                            <input type="range" min="0" max="1" step="0.01" value={volume} onChange={(e) => setVolume(Number(e.target.value))} />
                        </div>
                    </div>
                    <div className={`border-4 ${theme.border} bg-white p-2 flex-1 overflow-auto`}>
                        {loading && <div className="font-black text-xs uppercase">Loading tracks...</div>}
                        {!loading && !filteredTracks.length && <div className="font-black text-xs uppercase">No tracks match this filter.</div>}
                        {!loading && filteredTracks.map((track, idx) => (
                            <button key={track.id} onClick={() => setCurrentIdx(idx)} className={`w-full text-left px-2 py-2 border-2 border-black mb-1 ${idx === currentIdx ? 'bg-[#FFDE59]' : 'bg-white'} hover:bg-[#FFE1A8]`}>
                                <div className="font-black text-xs uppercase">{track.title}</div>
                                <div className="text-[10px]">{track.description}</div>
                                <div className="mt-1 flex flex-wrap gap-1 text-[9px] font-black uppercase">
                                    <span className="px-1 py-[2px] border border-black bg-[#D9F99D]">{track.playbackType === 'preview' ? 'preview' : 'full'}</span>
                                    <span className="px-1 py-[2px] border border-black bg-[#BFDBFE]">{(track.language || 'unknown').toUpperCase()}</span>
                                    <span className="px-1 py-[2px] border border-black bg-[#F5F5F5]">{track.source || 'source'}</span>
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

                    if (!res.ok) throw new Error('Cannot load space/robotics catalog');
                    const data = await res.json();
                    const nextItems = Array.isArray(data.results) ? data.results : [];
                    setCartoons(nextItems);
                    if (!activeMedia.url && nextItems[0]?.mediaUrl) {
                        setSelectedIdx(0);
                        setActiveMedia({ type: 'video', url: nextItems[0].mediaUrl, title: nextItems[0].title || '' });
                    }
                } catch (err) {
                    setError(err.message || 'Catalog load failed');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadCatalog(); }, []);

                const lower = raw.toLowerCase();
                if (lower.includes('youtube.com/watch?v=')) {
                    const id = raw.split('v=')[1]?.split('&')[0];
                    if (id) return `https://www.youtube.com/embed/${id}?autoplay=1`;
                }
                if (lower.includes('youtu.be/')) {
                    const id = raw.split('youtu.be/')[1]?.split('?')[0];
                    if (id) return `https://www.youtube.com/embed/${id}?autoplay=1`;

                if (lower.includes('youtube.com/embed/')) return raw;
                return '';

                const embed = convertToEmbedUrl(candidate);

        function CalendarContent({ theme }) {
            const [viewMode, setViewMode] = useState('month');
            const [cursorDate, setCursorDate] = useState(new Date());
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const range = React.useMemo(() => {
                const base = new Date(cursorDate);
                if (viewMode === 'week') {
                    const day = base.getDay();
                    const start = new Date(base);
                    start.setDate(base.getDate() - day);
                    const end = new Date(start);
                    end.setDate(start.getDate() + 6);
                    return { start, end };
                }
                const start = new Date(base.getFullYear(), base.getMonth(), 1);
                const end = new Date(base.getFullYear(), base.getMonth() + 1, 0);
                return { start, end };
            }, [cursorDate, viewMode]);

            const formatDate = (d) => d.toISOString().slice(0, 10);

            const loadEvents = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(`/api/calendar/events?from=${encodeURIComponent(formatDate(range.start))}&to=${encodeURIComponent(formatDate(range.end))}`);
                    if (!res.ok) throw new Error('Calendar feed unavailable');
                    const data = await res.json();
                    setEvents(Array.isArray(data.results) ? data.results : []);
                } catch (err) {
                    setError(err.message || 'Calendar load failed');
                    setEvents([]);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadEvents(); }, [viewMode, range.start.getTime(), range.end.getTime()]);

            const shift = (delta) => {
                const next = new Date(cursorDate);
                if (viewMode === 'week') next.setDate(next.getDate() + (7 * delta));
                else next.setMonth(next.getMonth() + delta);
                setCursorDate(next);
            };

            const days = [];
            const iter = new Date(range.start);
            while (iter <= range.end) {
                days.push(new Date(iter));
                iter.setDate(iter.getDate() + 1);
            }

            return (
                <div className="flex flex-col gap-3 h-full min-h-[360px]">
                    <div className={`border-4 ${theme.border} bg-[#4FD1C5] text-black p-3 font-black uppercase text-xs`}>
                        SparkyPal Calendar | Live Events
                    </div>
                    <div className="flex gap-2 items-center">
                        <button onClick={() => shift(-1)} className="px-2 py-1 border-2 border-black bg-white text-xs font-black uppercase">Prev</button>
                        <button onClick={() => setCursorDate(new Date())} className="px-2 py-1 border-2 border-black bg-[#FFDE59] text-xs font-black uppercase">Today</button>
                        <button onClick={() => shift(1)} className="px-2 py-1 border-2 border-black bg-white text-xs font-black uppercase">Next</button>
                        <button onClick={() => setViewMode('month')} className={`px-2 py-1 border-2 border-black text-xs font-black uppercase ${viewMode === 'month' ? 'bg-[#00E5FF]' : 'bg-white'}`}>Month</button>
                        <button onClick={() => setViewMode('week')} className={`px-2 py-1 border-2 border-black text-xs font-black uppercase ${viewMode === 'week' ? 'bg-[#00E5FF]' : 'bg-white'}`}>Week</button>
                        <span className="ml-auto text-xs font-black uppercase">{range.start.toDateString()} - {range.end.toDateString()}</span>
                    </div>
                    {error && <div className="border-4 border-black bg-[#FF6B6B] p-2 text-xs font-black uppercase">{error}</div>}
                    <div className={`border-4 ${theme.border} bg-white p-2 grid grid-cols-7 gap-1`}>
                        {days.map((d) => (
                            <div key={d.toISOString()} className="border-2 border-black bg-[#f7f7f7] p-1 text-[10px] font-black uppercase min-h-[48px]">
                                {d.getDate()}
                            </div>
                        ))}
                    </div>
                    <div className={`border-4 ${theme.border} bg-white p-2 flex-1 overflow-auto`}>
                        {loading && <div className="text-xs font-black uppercase">Loading events...</div>}
                        {!loading && events.map((event) => (
                            <div key={event.id} className="border-2 border-black bg-white p-2 mb-1">
                                <div className="font-black text-xs uppercase">{event.title}</div>
                                <div className="text-[10px]">{event.description}</div>
                                <div className="text-[10px] mt-1 font-black uppercase">{event?.content?.date || '-'}</div>
                            </div>
                        ))}
                        {!loading && events.length === 0 && <div className="text-xs font-black uppercase">No events for selected range.</div>}
                    </div>
                </div>
            );
        }

        function LiveMapContent({ theme }) {
            const mapRef = useRef(null);
            const mapObjRef = useRef(null);
            const markerRef = useRef(null);
            const [query, setQuery] = useState('New York');
            const [places, setPlaces] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [selected, setSelected] = useState(null);

            useEffect(() => {
                if (!mapRef.current || mapObjRef.current || !window.L) return;
                const map = window.L.map(mapRef.current).setView([40.7128, -74.006], 10);
                window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
                mapObjRef.current = map;
                return () => {
                    map.remove();
                    mapObjRef.current = null;
                };
            }, []);

            const centerOn = async (lat, lon) => {
                if (!mapObjRef.current || !window.L) return;
                mapObjRef.current.setView([lat, lon], 13);
                if (markerRef.current) mapObjRef.current.removeLayer(markerRef.current);
                markerRef.current = window.L.marker([lat, lon]).addTo(mapObjRef.current);
                try {
                    const res = await fetch(`/api/map/reverse?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.result) setSelected(data.result);
                    }
                } catch {
                    // Keep map interaction alive even if reverse geocode fails.
                }
            };

            const search = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(`/api/map/search?q=${encodeURIComponent(query)}&limit=10`);
                    if (!res.ok) throw new Error('Map search unavailable');
                    const data = await res.json();
                    const next = Array.isArray(data.results) ? data.results : [];
                    setPlaces(next);
                    if (next[0]?.content) {
                        centerOn(next[0].content.lat, next[0].content.lon);
                        setSelected(next[0]);
                    }
                } catch (err) {
                    setError(err.message || 'Map search failed');
                    setPlaces([]);
                } finally {
                    setLoading(false);
                }
            };

            const useMyLocation = () => {
                if (!navigator.geolocation) return;
                navigator.geolocation.getCurrentPosition(
                    (pos) => centerOn(pos.coords.latitude, pos.coords.longitude),
                    () => setError('Location permission denied')
                );
            };

            useEffect(() => { search(); }, []);

            return (
                <div className="flex flex-col gap-3 h-full min-h-[420px]">
                    <div className={`border-4 ${theme.border} bg-[#7EC8FF] text-black p-3 font-black uppercase text-xs`}>

                        <button onClick={useMyLocation} className="px-2 py-1 border-2 border-black bg-[#00E5FF] text-xs font-black uppercase">My Location</button>
                    </div>

                    <div className={`border-4 ${theme.border} bg-white p-2 flex-1 min-h-0 grid grid-cols-3 gap-2`}>

                                    <div className="font-black text-xs uppercase">{place.title}</div>
                                    <div className="text-[10px] mt-1">{place.description}</div>
                                </button>
                            ))}
                            {selected ? <div className="border-2 border-black bg-[#FFDE59] p-2 text-[10px] font-black uppercase mt-2">{selected.description}</div> : null}

        function CalculatorContent({ theme }) {
            const [display, setDisplay] = useState('0');
            const [isScientific, setIsScientific] = useState(false);
            const [error, setError] = useState('');
            const buttons = ['7', '8', '9', '/', '4', '5', '6', '*', '1', '2', '3', '-', '0', '.', '(', ')', '+'];
            const sci = ['sqrt(', 'sin(', 'cos(', 'tan(', 'log(', 'ln(', '^', '%'];

            const append = (token) => {
                setError('');
                setDisplay((prev) => (prev === '0' ? token : `${prev}${token}`));
            };

            const clear = () => { setDisplay('0'); setError(''); };
            const del = () => setDisplay((prev) => (prev.length <= 1 ? '0' : prev.slice(0, -1)));
            const evalNow = async () => {
                try {
                    const res = await fetch('/api/math/solve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ expression: display, mode: 'evaluate' })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message || 'Invalid expression');
                    setDisplay(String(data.result));
                } catch (err) {
                    setError(err.message || 'Calculation failed');
                }
            };

            useEffect(() => {
                const onKey = (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); evalNow(); return; }
                    if (e.key === 'Backspace') { e.preventDefault(); del(); return; }
                    if (/^[0-9+\-*/().%]$/.test(e.key)) append(e.key);
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [display]);

            return (
                <div className="flex flex-col gap-3 h-full min-h-[320px]">
                    <div className={`border-4 ${theme.border} bg-[#FFD36E] text-black p-3 font-black uppercase text-xs`}>

                        <button onClick={() => setIsScientific((v) => !v)} className="px-2 py-1 border-2 border-black bg-[#00E5FF] text-xs font-black uppercase">{isScientific ? 'Standard' : 'Scientific'}</button>
                        <button onClick={clear} className="px-2 py-1 border-2 border-black bg-white text-xs font-black uppercase">Clear</button>
                        <button onClick={del} className="px-2 py-1 border-2 border-black bg-white text-xs font-black uppercase">Del</button>
                        <button onClick={evalNow} className="ml-auto px-2 py-1 border-2 border-black bg-[#FFDE59] text-xs font-black uppercase">=</button>
                    </div>
                    {isScientific && <div className="grid grid-cols-4 gap-1">{sci.map((k) => <button key={k} onClick={() => append(k)} className="border-2 border-black bg-white p-2 text-xs font-black uppercase">{k}</button>)}</div>}
                    <div className="grid grid-cols-4 gap-1">{buttons.map((k) => <button key={k} onClick={() => append(k)} className="border-2 border-black bg-white p-3 text-sm font-black uppercase">{k}</button>)}</div>

            );
        }

            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const loadWatchlist = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(`/api/stocks/watchlist?symbols=${encodeURIComponent(symbols)}`);
                    if (!res.ok) throw new Error('Stocks feed unavailable');
                    const data = await res.json();
                    const next = Array.isArray(data.results) ? data.results : [];
                    setItems(next);
                    if (next[0]?.content?.symbol) setSelected(next[0].content.symbol);
                } catch (err) {
                    setError(err.message || 'Failed to load stocks');
                    setItems([]);
                } finally {
                    setLoading(false);
                }
            };

            const loadChart = async (symbol, nextRange = range) => {
                try {
                    const res = await fetch(`/api/stocks/chart?symbol=${encodeURIComponent(symbol)}&range=${encodeURIComponent(nextRange)}`);
                    if (!res.ok) throw new Error('Chart unavailable');
                    const data = await res.json();
                    setChart(Array.isArray(data?.result?.points) ? data.result.points : []);
                } catch {
                    setChart([]);
                }
            };

            useEffect(() => { loadWatchlist(); }, []);
            useEffect(() => {
                if (selected) loadChart(selected, range);
            }, [selected, range]);

            const min = chart.reduce((acc, p) => Math.min(acc, p.p), Number.POSITIVE_INFINITY);
            const max = chart.reduce((acc, p) => Math.max(acc, p.p), Number.NEGATIVE_INFINITY);
            const points = chart.map((p, idx) => {
                const x = chart.length <= 1 ? 0 : (idx / (chart.length - 1)) * 100;
                const y = max === min ? 50 : 100 - ((p.p - min) / (max - min)) * 100;
                return `${x},${y}`;
            }).join(' ');

            return (
                <div className="flex flex-col gap-3 h-full min-h-[380px]">
                    <div className={`border-4 ${theme.border} bg-[#B9FF6E] text-black p-3 font-black uppercase text-xs`}>

        function ConsoleContent({ theme, fs, setFs, username }) {
            const [history, setHistory] = useState(['SPARKYPAL OS v0.1', 'Type "help" for a list of commands.']);
            const [input, setInput] = useState('');
            const [cwd, setCwd] = useState('Documents');
            const endRef = useRef(null);

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmdStr = input.trim();
                    const newHist = [...history, `C:\\${cwd}> ${cmdStr}`];

                    if (cmdStr) {
                        const args = cmdStr.split(' ');
                        const cmd = args[0].toLowerCase();

                        if (cmd === 'help') {
                            newHist.push('COMMANDS: help, clear, date, time, whoami, uname, systeminfo, ls, cd <dir>, mkdir <dir>, cat <file>, echo <text> > <file>, rm <file>');
                        } else if (cmd === 'clear') {
                            setHistory([]); setInput(''); return;
                        } else if (cmd === 'date') {
                            newHist.push(new Date().toDateString());
                        } else if (cmd === 'time') {
                            newHist.push(new Date().toLocaleTimeString());
                        } else if (cmd === 'whoami') {
                            newHist.push(username || 'USER');
                        } else if (cmd === 'uname') {
                            newHist.push('SparkyPalOS Kernel v1.0.0');
                        } else if (cmd === 'systeminfo') {
                            newHist.push('OS Name: SparkyPalOS\nVersion: 1.0.0\nMemory: 640K (Ought to be enough)\nCPU: Brutalist-Core\nStatus: Optimal');
                        } else if (cmd === 'mkdir') {
                            const target = args[1];
                            if (target) {
                                if (fs[target]) newHist.push(`Directory already exists: ${target}`);
                                else {
                                    setFs(prev => ({ ...prev, [target]: {} }));
                                    newHist.push(`Created directory: ${target}`);
                                }
                            } else newHist.push('Usage: mkdir <dir>');
                        } else if (cmd === 'ls') {
                            let items = [];
                            if (cwd === 'Root') items = Object.keys(fs);
                            else items = Object.keys(fs[cwd] || {});
                            newHist.push(items.length > 0 ? items.join('   ') : '(empty)');
                        } else if (cmd === 'cd') {
                            const target = args[1];
                            if (!target || target === '..') setCwd('Root');
                            else if (target === 'Root') setCwd('Root');
                            else if (fs[target]) setCwd(target);
                            else newHist.push(`Directory not found: ${target}`);
                        } else if (cmd === 'cat') {
                            const file = args[1];
                            let found = false;
                            if (cwd === 'Root') {
                                newHist.push(`Cannot read file directly from Root. cd into a directory first.`);
                                found = true;
                            } else if (fs[cwd] && fs[cwd][file]) {
                                const content = fs[cwd][file];
                                if (content.startsWith('data:image')) newHist.push(`[IMAGE FILE: ${file}]`);
                                else newHist.push(content);
                                found = true;
                            }
                            if (!found) newHist.push(`File not found: ${file}`);
                        } else if (cmd === 'rm') {
                            const file = args[1];
                            if (fs[cwd] && fs[cwd][file]) {
                                setFs(prev => {
                                    const next = { ...prev };
                                    delete next[cwd][file];
                                    return next;
                                });
                                newHist.push(`Deleted ${file}`);
                            } else newHist.push(`File not found: ${file}`);
                        } else if (cmd === 'echo') {
                            const outIdx = args.indexOf('>');
                            if (outIdx !== -1 && args[outIdx + 1]) {
                                const content = args.slice(1, outIdx).join(' ');
                                const fileName = args[outIdx + 1];
                                setFs(prev => ({
                                    ...prev,
                                    [cwd]: { ...(prev[cwd] || {}), [fileName]: content }
                                }));
                                newHist.push(`Written to ${fileName}`);
                            } else {
                                newHist.push(args.slice(1).join(' '));
                            }
                        } else {
                            newHist.push(`COMMAND NOT FOUND: '${cmd}'`);
                        }
                    }

                    setHistory(newHist);
                    setInput('');
                }
            };

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [history]);

            return (
                <div className={`bg-black text-[#00E5FF] p-4 h-full overflow-y-auto font-mono text-sm border-4 ${theme.border} flex flex-col min-h-[300px]`}>
                    {history.map((line, i) => <div key={i} className="mb-1 whitespace-pre-wrap">{line}</div>)}
                    <div className="flex gap-2 mt-1">
                        <span>C:\{cwd}{'>'}</span>
                        <input autoFocus type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={handleCommand}
                            className="bg-transparent outline-none flex-1 text-[#00E5FF] font-mono uppercase" spellCheck="false" />
                    </div>
                    <div ref={endRef} />
                </div>
            );
        }

                        </div>
                    ))}
                </div>
            );

        // --- ATOMIC UI HELPERS ---

        function DesktopIcon({ name, label, bgColor = "bg-white", onDoubleClick, theme, initPos }) {
            const [pos, setPos] = useState(initPos || { x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const dragRef = useRef(null);
            const iconRef = useRef(null);

            const handlePointerDown = (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                e.preventDefault();
                dragRef.current = { startX: e.clientX, startY: e.clientY, initX: pos.x, initY: pos.y, moved: false, pointerType: e.pointerType };
                setIsDragging(true);
                document.body.classList.add('dragging-window');
            };

            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (!isDragging || !dragRef.current) return;
                    if (dragRef.current.pointerType === 'touch') e.preventDefault();

                    const newX = dragRef.current.initX + (e.clientX - dragRef.current.startX);
                    const newY = dragRef.current.initY + (e.clientY - dragRef.current.startY);

                    if (iconRef.current) {
                        iconRef.current.style.left = `${newX}px`;
                        iconRef.current.style.top = `${newY}px`;
                    }

                    dragRef.current.lastX = newX;
                    dragRef.current.lastY = newY;
                    if (Math.abs(e.clientX - dragRef.current.startX) > 6 || Math.abs(e.clientY - dragRef.current.startY) > 6) {
                        dragRef.current.moved = true;
                    }
                };
                const handlePointerUp = () => {
                    if (isDragging) {
                        setIsDragging(false);
                        document.body.classList.remove('dragging-window');
                        if (dragRef.current && dragRef.current.lastX !== undefined) {
                            setPos({ x: dragRef.current.lastX, y: dragRef.current.lastY });
                        }
                        if (dragRef.current && dragRef.current.pointerType === 'touch' && !dragRef.current.moved) {
                            onDoubleClick?.();
                        }
                        dragRef.current = null;
                    }
                };
                if (isDragging) {
                    document.addEventListener('pointermove', handlePointerMove, { passive: false });
                    document.addEventListener('pointerup', handlePointerUp);
                    document.addEventListener('pointercancel', handlePointerUp);
                }
                return () => {
                    document.removeEventListener('pointermove', handlePointerMove);
                    document.removeEventListener('pointerup', handlePointerUp);
                    document.removeEventListener('pointercancel', handlePointerUp);
                };
            }, [isDragging, onDoubleClick]);

            return (
                <div ref={iconRef} className="desktop-icon absolute flex flex-col items-center gap-2 cursor-pointer group select-none hover:z-40"
                    style={{ left: pos.x, top: pos.y }}
                    onPointerDown={handlePointerDown}
                    onDoubleClick={onDoubleClick}>

                    </div>
                    <span className={`desktop-icon-label font-black bg-black text-white px-2 py-1 uppercase tracking-wider text-center`}>
                        {label}
                    </span>
                </div>
            );
        }
