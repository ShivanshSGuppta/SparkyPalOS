services:
  app:
    image: ${APP_IMAGE:-sparkypalos-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    restart: unless-stopped
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
